<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Acchiappa i Quanti — BLINK</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    html, body { margin:0; padding:0; overflow:hidden; width:100%; height:100%; background:#060e1a; }
    body::before { display:none; }

    .game-canvas { position:fixed; inset:0; }
    .game-canvas canvas { position:absolute; inset:0; width:100%; height:100%; }

    .game-hud {
      position:fixed; top:0; left:0; right:0; z-index:20;
      display:flex; justify-content:space-between; align-items:center;
      padding:14px 16px; pointer-events:none;
      background:linear-gradient(to bottom, rgba(6,14,26,0.9), transparent);
    }
    .game-timer {
      font-family:'Orbitron',sans-serif; font-size:1rem;
      font-weight:700; color:#ff3366;
    }
    .game-score {
      font-family:'Orbitron',sans-serif; font-size:1rem;
      font-weight:700; color:#00d9ff;
    }

    .game-close {
      position:fixed; top:12px; right:12px; z-index:30;
      width:36px; height:36px; border-radius:50%;
      background:rgba(6,14,26,0.6); border:1px solid rgba(255,255,255,0.15);
      color:#7da3c0; font-size:1.2rem;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer;
    }

    .game-intro {
      position:fixed; inset:0; z-index:50;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background:rgba(6,14,26,0.95); text-align:center; padding:32px;
    }
    .game-intro.hidden { display:none; }
    .game-intro h1 {
      font-family:'Orbitron',sans-serif; font-size:1.3rem;
      font-weight:900; color:#00d9ff; letter-spacing:3px;
      margin-bottom:16px;
    }
    .game-intro p {
      font-family:'Rajdhani',sans-serif; font-size:0.95rem;
      color:#7da3c0; line-height:1.6; max-width:280px;
      margin-bottom:24px;
    }
    .game-start-btn {
      font-family:'Orbitron',sans-serif; font-size:0.8rem;
      font-weight:700; letter-spacing:2px; text-transform:uppercase;
      padding:14px 40px;
      border:2px solid #00d9ff; border-radius:12px;
      background:rgba(0,217,255,0.1); color:#00d9ff;
      cursor:pointer; transition:all 0.2s;
    }
    .game-start-btn:active {
      background:rgba(0,217,255,0.25);
      box-shadow:0 0 20px rgba(0,217,255,0.3);
    }

    .game-result {
      position:fixed; inset:0; z-index:50;
      display:none; flex-direction:column;
      align-items:center; justify-content:center;
      background:rgba(6,14,26,0.92); text-align:center; padding:32px;
    }
    .game-result.visible { display:flex; }
    .game-result h2 {
      font-family:'Orbitron',sans-serif; font-size:1.5rem;
      font-weight:900; color:#00ff88; letter-spacing:3px;
      margin-bottom:8px;
    }
    .game-result .score-big {
      font-family:'Orbitron',sans-serif; font-size:3rem;
      font-weight:900; color:#00d9ff; margin:16px 0;
    }
    .game-result p {
      font-family:'Rajdhani',sans-serif; font-size:0.9rem;
      color:#7da3c0; margin-bottom:24px;
    }
    .game-result-btn {
      font-family:'Orbitron',sans-serif; font-size:0.7rem;
      font-weight:700; letter-spacing:2px; text-transform:uppercase;
      padding:12px 32px; margin:4px;
      border:1px solid #00d9ff; border-radius:10px;
      background:rgba(0,217,255,0.1); color:#00d9ff;
      cursor:pointer; text-decoration:none; display:inline-block;
    }
  </style>
</head>
<body>

  <div class="game-canvas" id="game-area"></div>

  <div class="game-hud" id="game-hud" style="display:none;">
    <div class="game-timer" id="game-timer">30</div>
    <div style="display:flex;align-items:center;gap:6px;">
      <span style="font-family:'Rajdhani',sans-serif;font-size:0.6rem;color:#7da3c0;letter-spacing:1px;text-transform:uppercase;">Cattura:</span>
      <img id="game-target-img" src="" style="width:28px;height:28px;object-fit:contain;">
    </div>
    <div class="game-score" id="game-score">0</div>
  </div>

  <button class="game-close" id="game-close">&times;</button>

  <div class="game-intro" id="game-intro">
    <h1>ACCHIAPPA I QUANTI</h1>
    <p>Particelle quantistiche impazzite cadono dal cielo! Toccale prima che fuggano. Hai 30 secondi!</p>
    <button class="game-start-btn" id="btn-start">GIOCA</button>
  </div>

  <div class="game-result" id="game-result">
    <h2 id="result-title">COMPLETATO!</h2>
    <div class="score-big" id="result-score">0</div>
    <p id="result-text">particelle catturate</p>
    <a href="../index.html" class="game-result-btn">TORNA A BLINK</a>
    <button class="game-result-btn" id="btn-retry" style="margin-top:6px; border-color:#7da3c0; color:#7da3c0;">GIOCA ANCORA</button>
  </div>

  <script src="../js/gamedata.js"></script>
  <script type="module">
    import { QuantumCatchGame } from '../js/shooter-level.js';

    const area = document.getElementById('game-area');
    let game = null;

    function startGame() {
      document.getElementById('game-intro').classList.add('hidden');
      document.getElementById('game-hud').style.display = 'flex';

      game = new QuantumCatchGame(area);

      game.onTargetChange = (food) => {
        document.getElementById('game-target-img').src = '../' + food.sprite;
      };
      game.onScoreChange = (s) => {
        document.getElementById('game-score').textContent = s;
      };
      game.onTimeChange = (t) => {
        document.getElementById('game-timer').textContent = t;
        if (t <= 5) document.getElementById('game-timer').style.color = '#ff3366';
      };
      game.onGameDone = (score) => {
        game.destroy();
        game = null;
        document.getElementById('game-hud').style.display = 'none';

        document.getElementById('result-score').textContent = score;
        if (score >= 15) {
          document.getElementById('result-title').textContent = 'FANTASTICO!';
          document.getElementById('result-title').style.color = '#00ff88';
        } else if (score >= 10) {
          document.getElementById('result-title').textContent = 'BRAVO!';
          document.getElementById('result-title').style.color = '#00d9ff';
        } else {
          document.getElementById('result-title').textContent = 'COMPLETATO';
          document.getElementById('result-title').style.color = '#ffe066';
        }
        document.getElementById('game-result').classList.add('visible');

        if (score >= 10 && window.GameData) {
          GameData.rewardShooter();
        }
        if (navigator.vibrate) navigator.vibrate([50, 100, 50]);
      };

      game.start();
    }

    document.getElementById('btn-start').addEventListener('click', startGame);

    document.getElementById('btn-retry').addEventListener('click', () => {
      document.getElementById('game-result').classList.remove('visible');
      document.getElementById('game-timer').style.color = '#ff3366';
      startGame();
    });

    document.getElementById('game-close').addEventListener('click', () => {
      if (game) game.destroy();
      window.location.href = '../index.html';
    });
  </script>
</body>
</html>
